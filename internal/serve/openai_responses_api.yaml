    ModelResponseProperties:
      type: object
      properties:
        metadata:
          $ref: '#/components/schemas/Metadata'
        top_logprobs:
          anyOf:
          - description: 'An integer between 0 and 20 specifying the number of most likely tokens to

              return at each token position, each with an associated log probability.

              '
            type: integer
            minimum: 0
            maximum: 20
          - type: 'null'
        temperature:
          anyOf:
          - type: number
            minimum: 0
            maximum: 2
            default: 1
            example: 1
            description: 'What sampling temperature to use, between 0 and 2. Higher values like 0.8 will make the output more
              random, while lower values like 0.2 will make it more focused and deterministic.

              We generally recommend altering this or `top_p` but not both.

              '
          - type: 'null'
        top_p:
          anyOf:
          - type: number
            minimum: 0
            maximum: 1
            default: 1
            example: 1
            description: 'An alternative to sampling with temperature, called nucleus sampling,

              where the model considers the results of the tokens with top_p probability

              mass. So 0.1 means only the tokens comprising the top 10% probability mass

              are considered.


              We generally recommend altering this or `temperature` but not both.

              '
          - type: 'null'
        user:
          type: string
          example: user-1234
          deprecated: true
          description: 'This field is being replaced by `safety_identifier` and `prompt_cache_key`. Use `prompt_cache_key`
            instead to maintain caching optimizations.

            A stable identifier for your end-users.

            Used to boost cache hit rates by better bucketing similar requests and  to help OpenAI detect and prevent abuse.
            [Learn more](/docs/guides/safety-best-practices#safety-identifiers).

            '
        safety_identifier:
          type: string
          maxLength: 64
          example: safety-identifier-1234
          description: 'A stable identifier used to help detect users of your application that may be violating OpenAI''s
            usage policies.

            The IDs should be a string that uniquely identifies each user, with a maximum length of 64 characters. We recommend
            hashing their username or email address, in order to avoid sending us any identifying information. [Learn more](/docs/guides/safety-best-practices#safety-identifiers).

            '
        prompt_cache_key:
          type: string
          example: prompt-cache-key-1234
          description: 'Used by OpenAI to cache responses for similar requests to optimize your cache hit rates. Replaces
            the `user` field. [Learn more](/docs/guides/prompt-caching).

            '
        service_tier:
          $ref: '#/components/schemas/ServiceTier'
        prompt_cache_retention:
          anyOf:
          - type: string
            enum:
            - in-memory
            - 24h
            description: 'The retention policy for the prompt cache. Set to `24h` to enable extended prompt caching, which
              keeps cached prefixes active for longer, up to a maximum of 24 hours. [Learn more](/docs/guides/prompt-caching#prompt-cache-retention).

              '
          - type: 'null'
